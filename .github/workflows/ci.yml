name: CI

on:
  push:
    branches:
      - main
      - task-1
      - task-2
      - task-3
      - task-4

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Run lint
      run: |
        flake8 .

    - name: Run tests
      run: |
        pytest